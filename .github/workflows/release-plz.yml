name: Release-plz

on:
  push:
    branches:
      - master

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - &install-rust
        name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - &cache
        name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - &install-binstall
        name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@1800853f2578f8c34492ec76154caef8e163fbca
        env:
          BINSTALL_VERSION: 1.17.6
      - &install-release-plz
        name: Install release-plz
        shell: bash
        run: |
          cargo-binstall \
            release-plz@0.3.157 \
            --force \
            --strategies=crate-meta-data,compile \
            --no-confirm
      - name: Run release-plz release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: |
          release-plz release \
            --git-token "${GITHUB_TOKEN}" \
            --token "${CARGO_REGISTRY_TOKEN}" \
            -o json

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - *checkout
      - *install-rust
      - *cache
      - *install-binstall
      - *install-release-plz
      - name: Run release-plz PR
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_pr_stderr=$(mktemp)
          if ! release-plz release-pr \
            --git-token "${GITHUB_TOKEN}" \
            --repo-url "https://github.com/${GITHUB_REPOSITORY}" \
            -o json 2>"$release_pr_stderr"
          then
            release_pr_error=$(cat "$release_pr_stderr")
            if [[ "$release_pr_error" == *"422"* ]]; then
              echo "::warning::release-plz release-pr failed with HTTP 422; continuing with no PRs created."
            else
              echo "$release_pr_error" >&2
              rm -f "$release_pr_stderr"
              exit 1
            fi
          fi
          rm -f "$release_pr_stderr"
